<!doctype html>
<html lang="ru">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Delete timer demo</title>
		<style>
			body {
				font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
				padding: 24px;
				background: #0b1220;
				color: #e6e8ee;
			}
			.demo-row {
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 16px;
				padding: 14px 16px;
				border-radius: 12px;
				background: rgba(255, 255, 255, 0.06);
				border: 1px solid rgba(255, 255, 255, 0.08);
				max-width: 560px;
			}
			.timer-host {
				display: flex;
				align-items: center;
				gap: 12px;
			}
			[data-table-item-timer] {
				width: 44px;
				height: 44px;
				display: inline-flex;
				align-items: center;
				justify-content: center;
			}
			.timer-progress-circle {
				width: 44px;
				height: 44px;
				display: block;
			}
			.timer-progress-bg {
				fill: none;
				stroke: rgba(255, 255, 255, 0.18);
				stroke-width: 2.5;
			}
			.timer-progress-bar {
				fill: none;
				stroke: #62d69c;
				stroke-width: 2.5;
				stroke-linecap: round;
				transform: rotate(-90deg);
				transform-origin: 12px 12px;
				/* will be set in JS too, kept here for safety */
				stroke-dasharray: 62.83;
				stroke-dashoffset: 62.83;
				transition: stroke-dashoffset 120ms linear;
			}
			.timer-progress-text {
				fill: #e6e8ee;
				font-size: 8px;
				font-weight: 700;
			}
			.actions button {
				background: #1c2b4a;
				color: #e6e8ee;
				border: 1px solid rgba(255, 255, 255, 0.12);
				border-radius: 10px;
				padding: 8px 10px;
				cursor: pointer;
			}
			.actions button:hover {
				background: #24365d;
			}
		</style>
	</head>
	<body>
		<h2 style="margin: 0 0 12px;">Demo: таймер удаления</h2>
		<p style="margin: 0 0 18px; opacity: 0.8;">
			Кнопка “Запустить” вызывает <code>BX.Sale.BasketComponent.startDeleteInterval(node)</code>.
		</p>

		<div id="basket-item-height-aligner-demo" class="demo-row">
			<div class="timer-host">
				<div style="font-weight: 700;">Товар #123</div>
				<div data-table-item-timer></div>
			</div>
			<div class="actions">
				<button type="button" id="btnStart">Запустить</button>
				<button type="button" id="btnStop">Остановить</button>
			</div>
		</div>

		<script>
			// Minimal BX runtime so `component.js` can load.
			window.BX = window.BX || {};
			BX.Sale = BX.Sale || {};
			BX.browser = BX.browser || { IsMobile: function () { return false; } };
			BX.hasClass = BX.hasClass || function () { return false; };
			BX.namespace = BX.namespace || function (path) {
				var parts = String(path || '').split('.');
				var root = window;
				for (var i = 0; i < parts.length; i++) {
					var key = parts[i];
					if (!key) continue;
					root[key] = root[key] || {};
					root = root[key];
				}
				return root;
			};
			BX.delegate = BX.delegate || function (fn, ctx) {
				return function () { return fn.apply(ctx, arguments); };
			};
		</script>

		<script src="./component.js"></script>
		<script src="./timer-demo.js"></script>
	</body>
</html>
